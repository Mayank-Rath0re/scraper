version: '3.7'

services:
  postgres:
    image: postgres:16.3
    ports:
      - '8090:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: scrap
      POSTGRES_PASSWORD: "MRRSqlUpkDkgryK1OoweUKJ1eBAkfcdl"
    volumes:
      - scrap_data:/var/lib/postgresql/data
  redis:
    image: redis:6.2.6
    ports:
      - '8091:6379'
    command: redis-server --requirepass "3IY9pcU3mI1jhQOqDZhAHthhCwMv54MI"
    environment:
      - REDIS_REPLICATION_MODE=master
volumes:
  scrap_data:
